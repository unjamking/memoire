<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MÉMOIRE</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230b0b0f'/><text x='3' y='12' font-family='Georgia' font-size='11' fill='%23e8d3a8'>M</text></svg>">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:#0b0b0f; color:#cfcfd6;
    font:15px/1.55 Georgia,serif; overflow:hidden; }

  /* 3D fills the screen */
  #scene-canvas { position:fixed; inset:0; width:100%; height:100%; display:block; }

  /* center crosshair (hidden until in a 3D room) */
  #crosshair { position:fixed; left:50%; top:50%; width:6px; height:6px; margin:-3px 0 0 -3px;
    border-radius:50%; background:rgba(223,230,238,.55); pointer-events:none; display:none; z-index:4; }
  /* hover prompt — object NAME on top, action below. Appears when crosshair is on something in range */
  #ph { position:fixed; top:50%; left:50%; transform:translate(-50%,-130%); z-index:5;
    text-align:center; opacity:0; transition:opacity .15s; pointer-events:none;
    text-shadow:0 0 12px #000, 0 0 4px #000; display:none; }
  #ph .ph-name { display:block; color:#e8d3a8; font-size:18px; letter-spacing:.06em; margin-bottom:4px; }
  #ph .ph-act { display:block; color:#9fb4c0; font-size:12px; letter-spacing:.18em; text-transform:uppercase; }

  /* centered modal — case files in the middle of the screen */
  #center-modal { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:20;
    display:none; width:min(560px,92vw); max-height:84vh; overflow-y:auto;
    background:rgba(10,14,20,.96); border:1px solid #2a3a4a; padding:22px 26px;
    font-family:"SF Mono",Menlo,monospace; font-size:13px; line-height:1.6;
    box-shadow:0 0 40px rgba(0,0,0,.7); animation:popIn .32s var(--ease-out); }
  #center-modal button { background:#16202a; color:#cfcfd6; border:1px solid #3a4a5a;
    padding:8px 22px; cursor:pointer; font:inherit; }
  #center-modal button:hover { border-color:#7aa2c0; }

  /* --- animations (smooth easing curves) --- */
  :root { --ease-out: cubic-bezier(.16,1,.3,1); --ease-soft: cubic-bezier(.33,1,.68,1); }
  @keyframes riseIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes popIn  { from { opacity:0; transform:scale(.94); } to { opacity:1; transform:none; } }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation:none !important; transition:none !important; } }
  /* scene transition fade-to-black */
  #fade { position:fixed; inset:0; z-index:25; background:#06070b; opacity:0;
    pointer-events:none; transition:opacity .5s ease; }
  #fade.on { opacity:1; }

  /* Telltale-style: boxless subtitle near the bottom, choices as inline options. */
  #overlay { position:fixed; left:50%; bottom:9vh; transform:translateX(-50%);
    width:min(1000px,94vw); z-index:28;
    display:flex; flex-direction:column; align-items:center; gap:18px;
    pointer-events:none; text-align:center; }
  #overlay-log { pointer-events:none; }
  #overlay-log p { margin:0; max-width:880px;
    text-shadow:0 2px 10px rgba(0,0,0,.95), 0 0 24px rgba(0,0,0,.8); }
  /* speaker name — small caps above the line, gold */
  .who-tag { display:block; color:#e8d3a8; font-size:14px; letter-spacing:.22em;
    text-transform:uppercase; margin-bottom:7px;
    text-shadow:0 2px 8px rgba(0,0,0,.95); animation:fadeIn .5s var(--ease-soft); }
  /* speaker portrait — Higgsfield keyart above the name tag */
  .who-port { width:88px; height:88px; border-radius:50%; object-fit:cover; margin:0 auto 10px;
    display:block; border:1px solid rgba(232,211,168,.55);
    box-shadow:0 4px 24px rgba(0,0,0,.8), 0 0 18px rgba(232,211,168,.12);
    animation:fadeIn .5s var(--ease-soft); }
  .who-port.degraded { filter:grayscale(.9) contrast(1.15) brightness(.8); }
  /* case-file keyart header — full-bleed at the top of the modal */
  #center-modal .cf-art { width:calc(100% + 52px); margin:-22px -26px 14px; display:block;
    border-bottom:1px solid #2a3a4a; }
  #overlay-log p { animation:riseIn .5s var(--ease-out) both; }
  .say { color:#f4f5f8; font-size:23px; line-height:1.5; font-weight:400; }
  .banner { color:#bfd4e4; font-size:18px; letter-spacing:.06em; }
  .scene { color:#b8ccb8; font-style:italic; font-size:17px; line-height:1.5; }
  .hint  { color:#9aa4b4; font-size:14px; }
  .reveal { color:#e8c08a; font-size:20px; }
  .collapse { color:#e89090; font-size:20px; }
  .outcome { color:#d0a4dc; font-size:21px; }
  /* cinematic cues */
  .sysmsg { color:#8fb0c4; font-family:"SF Mono",Menlo,monospace; font-size:16px;
    letter-spacing:.08em; line-height:1.6; }
  .soundcue { color:#9aa4b4; font-style:italic; font-size:16px; opacity:.85; }
  .stability { color:#c0a07a; font-family:"SF Mono",Menlo,monospace; font-size:16px; letter-spacing:.1em; }
  /* flicker + shake screen effects */
  @keyframes flickerKf { 0%,100%{filter:none} 20%{filter:brightness(1.6)} 25%{filter:brightness(.5)}
    40%{filter:brightness(1.3)} 55%{filter:brightness(.7)} 70%{filter:brightness(1.1)} }
  body.flicker { animation:flickerKf .42s steps(2,end); }
  @keyframes shakeKf { 0%,100%{transform:translate(0,0)} 20%{transform:translate(-4px,2px)}
    40%{transform:translate(4px,-2px)} 60%{transform:translate(-3px,-3px)} 80%{transform:translate(3px,3px)} }
  body.shake { animation:shakeKf .42s ease-in-out; }
  /* choices — inline horizontal bracketed options, Telltale style */
  #overlay-choices { display:flex; flex-wrap:wrap; justify-content:center;
    align-items:center; gap:12px 30px; pointer-events:auto; }
  #overlay-choices button { background:transparent; color:#cdd6e0;
    border:none; padding:8px 12px; cursor:pointer; font:inherit; font-size:18px;
    letter-spacing:.02em; transition:transform .2s var(--ease-out), color .2s; white-space:nowrap;
    text-shadow:0 2px 8px rgba(0,0,0,.9); animation:riseIn .55s var(--ease-out) both; }
  #overlay-choices button .brk { color:#7a8696; }
  #overlay-choices button:hover { color:#e8d3a8; transform:scale(1.06); }
  #overlay-choices button:hover .brk { color:#e8d3a8; }
  /* lone Continue button — gentle pulse so it's noticed after a line settles */
  #overlay-choices .continue-btn { color:#aeb8c4; animation:riseIn .45s var(--ease-out) both, breathe 2.4s ease-in-out 1.1s infinite; }
  @keyframes breathe { 0%,100% { opacity:.72; } 50% { opacity:1; } }
  /* ---- free-roam HUD: minimap + objective + world markers ---- */
  #minimap { position:fixed; right:18px; bottom:18px; z-index:8; width:188px; height:188px;
    border-radius:50%; border:2px solid rgba(122,162,192,.5); background:rgba(8,12,18,.72);
    box-shadow:0 4px 24px rgba(0,0,0,.6), inset 0 0 30px rgba(0,0,0,.5); display:none; }
  #objective { position:fixed; left:18px; top:40px; z-index:8; display:none;
    background:rgba(8,12,18,.72); border:1px solid rgba(122,162,192,.35); border-left:3px solid #e8d3a8;
    padding:10px 16px; max-width:300px; backdrop-filter:blur(4px); }
  #objective .obj-h { color:#7aa2c0; font-size:10px; letter-spacing:.22em; margin-bottom:4px; }
  #objective .obj-t { color:#e4e6ee; font-size:14px; line-height:1.4; }
  #objective .obj-s { color:#8090a0; font-size:11px; margin-top:4px; }
  .wmark { position:fixed; z-index:7; transform:translate(-50%,-50%); pointer-events:none;
    text-align:center; color:#e8c08a; font-family:"SF Mono",Menlo,monospace; font-size:11px;
    letter-spacing:.08em; text-shadow:0 2px 8px #000; display:none; }
  .wmark .wm-i { display:block; font-size:16px; animation:breathe 2s ease-in-out infinite; }
  .wmark.done { color:#8fb89f; }
  .wmark.bureau { color:#e8d3a8; }
  /* auto-advance cue — small pulsing chevron, no button */
  .adv-hint { color:#7a8696; font-size:13px; animation:breathe 1.6s ease-in-out infinite; pointer-events:none; }
  /* cognitive-drift vignette — tone, never a meter. Driven by body[data-band]. */
  #vignette { position:fixed; inset:0; z-index:3; pointer-events:none; opacity:0; transition:opacity 1.4s ease;
    background:radial-gradient(ellipse at center, transparent 52%, rgba(8,4,12,.78) 100%); }
  body[data-band="doubting"] #vignette { opacity:.45; }
  body[data-band="fracturing"] #vignette { opacity:.75; animation:vignettePulse 3.4s ease-in-out infinite; }
  @keyframes vignettePulse { 0%,100% { opacity:.62; } 50% { opacity:.88; } }
  .cf-head { color:#7aa2c0; letter-spacing:1px; font-size:11px; border-bottom:1px solid #2a3a4a; padding-bottom:6px; margin-bottom:10px; }
  .cf-title { color:#e4e6ee; font-weight:bold; margin-bottom:8px; }
  #center-modal p { margin:8px 0; color:#b8bcc8; }
  #center-modal table { width:100%; border-collapse:collapse; margin:10px 0; }
  #center-modal td { padding:4px 6px; border-top:1px solid #1c2630; color:#cfcfd6; }
  #center-modal td:first-child { color:#8090a0; width:42%; }
  .cf-verdict { color:#c0a07a !important; }
  .cf-obj { color:#9fb89f !important; }
  .board-row { display:flex; flex-direction:column; gap:2px; width:100%; text-align:left;
    background:#10141c; color:#cfcfd6; border:1px solid #2a3340; padding:10px 14px; margin:6px 0;
    cursor:pointer; font:inherit; }
  .board-row:hover { border-color:#7aa2c0; background:#141a24; }
  .board-row.locked { opacity:.45; cursor:default; }
  .board-row .br-id { color:#e4e6ee; letter-spacing:.04em; }
  .board-row .br-sub { color:#8090a0; font-size:12px; }
  /* pause / Esc menu */
  #pause { position:fixed; inset:0; z-index:40; background:rgba(8,10,16,.82);
    display:none; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
  #pause { transition:opacity .25s var(--ease-soft); }
  #pause .pause-box { display:flex; flex-direction:column; gap:10px; width:min(320px,86vw); text-align:center; animation:popIn .3s var(--ease-out); }
  #pause .pause-title { color:#e8d3a8; letter-spacing:.42em; font-size:14px; margin-bottom:14px; text-indent:.42em; }
  #pause .menu-btn { display:flex; flex-direction:column; align-items:center; gap:2px;
    background:#10141ce6; color:#e4e6ee; border:1px solid #2a3340; padding:14px 18px; cursor:pointer; font:inherit; transition:.12s; }
  #pause .menu-btn:hover { border-color:#e8d3a8; background:#141a24e6; }
  #pause .menu-btn .mb-t { font-size:17px; letter-spacing:.08em; color:#e8d3a8; }
  #pause .menu-btn .mb-s { font-size:11px; color:#8090a0; }
  #esc-hint { position:fixed; top:8px; right:8px; z-index:10; font-size:11px; letter-spacing:.1em;
    color:#667; background:#10141caa; border:1px solid #2a3340; padding:4px 9px; pointer-events:none; }

  /* title / volume-select screen — Higgsfield archive keyart under the vignette */
  #title { position:fixed; inset:0; z-index:30;
    background:radial-gradient(ellipse at center, rgba(8,10,16,.45) 0%, rgba(6,7,11,.88) 100%),
      url("assets/higgsfield/archive.png") center/cover no-repeat #0b0b0f;
    backdrop-filter:blur(3px) saturate(.8);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; padding:30px; }
  #title h1 { font-weight:400; letter-spacing:.42em; font-size:clamp(34px,8vw,72px);
    color:#e8d3a8; margin:0 0 2px; text-indent:.42em; animation:titleIn 2.6s var(--ease-soft) both;
    text-shadow:0 0 34px rgba(232,211,168,.35), 0 2px 12px rgba(0,0,0,.9); }
  @keyframes titleIn { from { opacity:0; letter-spacing:.6em; } to { opacity:1; letter-spacing:.42em; } }
  #title .sub { color:#7aa2c0; letter-spacing:.28em; font-size:13px; text-transform:uppercase; margin-bottom:30px; animation:fadeIn 2s var(--ease-soft); }
  #title .vols { display:flex; flex-direction:column; gap:8px; width:min(440px,92vw); }
  #title .vol { display:flex; align-items:baseline; gap:12px; text-align:left;
    background:#10141ccc; color:#cfcfd6; border:1px solid #2a3340; padding:12px 16px;
    cursor:pointer; font:inherit; }
  #title .vol:hover { border-color:#7aa2c0; background:#141a24cc; }
  #title .vol .n { color:#7aa2c0; letter-spacing:.18em; font-size:12px; min-width:64px; }
  #title .vol .t { color:#e4e6ee; }
  #title .vol .done { color:#9fb89f; font-size:11px; margin-left:auto; letter-spacing:.1em; }
  #title .vol:disabled { opacity:.4; cursor:default; }
  #title .vol:disabled:hover { border-color:#2a3340; background:#10141ccc; }
  #title .foot { margin-top:26px; color:#556; font-size:12px; letter-spacing:.06em; }
  #title .foot a { color:#7aa2c0; cursor:pointer; text-decoration:underline; }
  /* main menu buttons */
  #title .menu { display:flex; flex-direction:column; gap:10px; width:min(340px,90vw); }
  #title .menu-btn:nth-child(1) { animation-delay:.15s; }
  #title .menu-btn:nth-child(2) { animation-delay:.28s; }
  #title .menu-btn:nth-child(3) { animation-delay:.41s; }
  #title .menu-btn { animation:riseIn .6s var(--ease-out) both; transition:.18s var(--ease-out); display:flex; flex-direction:column; align-items:flex-start; gap:2px;
    background:#10141ccc; color:#e4e6ee; border:1px solid #2a3340; padding:14px 18px;
    cursor:pointer; font:inherit; transition:.12s; }
  #title .menu-btn:hover:not(:disabled) { border-color:#e8d3a8; background:#141a24cc; }
  #title .menu-btn:disabled { opacity:.38; cursor:default; }
  #title .menu-btn .mb-t { font-size:18px; letter-spacing:.08em; color:#e8d3a8; }
  #title .menu-btn .mb-s { font-size:12px; color:#8090a0; letter-spacing:.04em; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="title">
  <h1>MÉMOIRE</h1>
  <div class="sub">deciding what "happened" means</div>

  <!-- main menu -->
  <div class="menu" id="main-menu">
    <button class="menu-btn" id="m-continue"><span class="mb-t">Continue</span><span class="mb-s" id="m-continue-sub"></span></button>
    <button class="menu-btn" id="m-new"><span class="mb-t">New Game</span><span class="mb-s">Begin from Volume I</span></button>
    <button class="menu-btn" id="m-select"><span class="mb-t">Select Volume</span><span class="mb-s">Jump to an unlocked volume</span></button>
  </div>

  <!-- volume select submenu (hidden until opened) -->
  <div class="vols" id="vol-list" style="display:none"></div>
  <div class="foot" id="select-foot" style="display:none"><a id="m-back">‹ back</a></div>

  <div class="foot" id="main-foot">A continuous save carries your choices across volumes.</div>
</div>
<div id="pause">
  <div class="pause-box">
    <div class="pause-title">PAUSED</div>
    <button class="menu-btn" id="p-resume"><span class="mb-t">Resume</span></button>
    <button class="menu-btn" id="p-menu"><span class="mb-t">Main Menu</span><span class="mb-s">Progress is saved automatically</span></button>
  </div>
</div>
<div id="vignette"></div>
<div id="fade"></div>
<canvas id="scene-canvas"></canvas>
<div id="crosshair"></div>
<div id="ph"><span class="ph-name">Object</span><span class="ph-act">[E] Examine</span></div>
<div id="center-modal"></div>
<div id="overlay">
  <div id="overlay-log"><p class="scene">Loading the Archive… (if this persists, the 3D library failed to load — check your connection)</p></div>
  <div id="overlay-choices"></div>
</div>
<div id="esc-hint">ESC — Menu</div>
<canvas id="minimap" width="188" height="188"></canvas>
<div id="objective"><div class="obj-h">OBJECTIVE</div><div class="obj-t"></div><div class="obj-s"></div></div>
<div id="wmarks"></div>

<script type="module">
  import { playCase, runStandaloneDialogue, playCinematicCase } from "./src/game.js";
  import { UI } from "./src/ui_three.js";
  import { State } from "./src/state.js";
  const playDialogue = (dlg) => runStandaloneDialogue(dlg, UI);

  const VOLUMES = [
    { id: "vol1_lighthouse", n: "VOL. I",  t: "The Awakening",        done: "vol1_ending" },
    { id: "vol2_river",      n: "VOL. II", t: "Fractures",            done: "vol2_ending" },
    { id: "vol3_observatory",n: "VOL. III",t: "Echo Structures",      done: "vol3_ending" },
    { id: "vol4_null",       n: "VOL. IV", t: "Interpretation War",   done: "vol4_ending" },
    { id: "vol5_origin",     n: "VOL. V",  t: "The Echo War",         done: "vol5_ending" },
    { id: "vol6_prime",      n: "VOL. VI", t: "The Last Archive",     done: "vol6_ending" },
  ];

  const $id = (x) => document.getElementById(x);
  const flag = (f) => !!State.data.flags[f];
  // A volume is unlocked if it's the first or the prior one is finished.
  const volUnlocked = (i) => i === 0 || flag(VOLUMES[i - 1].done);
  const hasSave = () => VOLUMES.some((v) => flag(v.done));
  // Continue resumes at the first unlocked volume you haven't finished yet.
  function continueVol() {
    for (let i = 0; i < VOLUMES.length; i++)
      if (volUnlocked(i) && !flag(VOLUMES[i].done)) return VOLUMES[i];
    return VOLUMES[VOLUMES.length - 1]; // all done → the finale
  }

  // Main menu state machine. Resolves with the chosen case id.
  function showTitle() {
    return new Promise((resolve) => {
      const main = $id("main-menu"), list = $id("vol-list");
      // Hold black while the first scene (apartment) loads — no office glimpse.
      // transition:none so the black is instant, not a .5s fade-in the office peeks through.
      const start = (id) => { const f = $id("fade"); f.style.transition = "none"; f.classList.add("on"); $id("title").style.display = "none"; resolve(id); };

      // --- Continue ---
      const cont = $id("m-continue");
      if (hasSave()) {
        const cv = continueVol();
        $id("m-continue-sub").textContent = `Resume at ${cv.n} — ${cv.t}`;
        cont.disabled = false;
        cont.onclick = () => start(cv.id);
      } else {
        $id("m-continue-sub").textContent = "No saved progress";
        cont.disabled = true;
      }

      // --- New Game --- (no browser confirm() — Chrome can suppress it silently.
      // First click arms the button; second click erases and starts.)
      let newArmed = false;
      $id("m-new").onclick = () => {
        if (hasSave() && !newArmed) {
          newArmed = true;
          $id("m-new").querySelector(".mb-t").textContent = "Erase save & start?";
          $id("m-new").querySelector(".mb-s").textContent = "Click again to confirm — this erases your choices";
          return;
        }
        localStorage.removeItem("memoire_save");
        State.reset();
        start("vol1_lighthouse");
      };

      // --- Select Volume (submenu) ---
      const showMain = () => {
        main.style.display = "flex"; $id("main-foot").style.display = "block";
        list.style.display = "none"; $id("select-foot").style.display = "none";
      };
      const showSelect = () => {
        main.style.display = "none"; $id("main-foot").style.display = "none";
        list.style.display = "flex"; $id("select-foot").style.display = "block";
        list.innerHTML = "";
        VOLUMES.forEach((v, i) => {
          const unlocked = volUnlocked(i), played = flag(v.done);
          const b = document.createElement("button");
          b.className = "vol";
          b.disabled = !unlocked;
          const tag = played ? `<span class="done">✓ played</span>`
                    : unlocked ? "" : `<span class="done">locked</span>`;
          b.innerHTML = `<span class="n">${v.n}</span><span class="t">${v.t}</span>${tag}`;
          if (unlocked) b.onclick = () => start(v.id);
          list.appendChild(b);
        });
      };
      $id("m-select").onclick = showSelect;
      $id("m-back").onclick = showMain;
      showMain();
    });
  }

  // --- Esc pause menu (available once the game is running) ---
  let paused = false, gameRunning = false;
  const pauseEl = $id("pause");
  function setPause(p) {
    if (!gameRunning) return;
    paused = p;
    pauseEl.style.display = p ? "flex" : "none";
    UI.setPaused(p);
  }
  addEventListener("keydown", (e) => {
    if (e.code === "Escape" && gameRunning && $id("title").style.display === "none") {
      e.preventDefault();
      setPause(!paused);
    }
  });
  $id("p-resume").onclick = () => setPause(false);
  $id("p-menu").onclick = () => { location.href = location.pathname; }; // clean reload -> main menu

  const params = new URLSearchParams(location.search);
  const urlCase = params.get("case");
  const urlCine = params.get("cine");

  // Cinematic mode: play scripted scenes (Part 1A -> dive -> 2A -> dive), then menu.
  if (urlCine) {
    document.getElementById("title").style.display = "none";
    (async () => {
      UI.init();
      gameRunning = true;
      const CINE_CHAIN = { cine_1a_first_morning: "cine_2a_archive_response" };
      let c = urlCine;
      while (c) { await playCinematicCase(c, UI); c = CINE_CHAIN[c]; }
      await UI.banner("— end of the cinematic —");
      location.href = location.pathname;
    })().catch((e) => {
      document.getElementById("overlay-log").innerHTML = "<p style='color:#c07a7a'>Error: " + e.message + "</p>";
      console.error(e);
    });
  } else
  (async () => {
    UI.init(); // ambient void behind dialogue — never a black screen
    // Direct link (?case=) or mid-run continuation skips the title; fresh load shows it.
    if (urlCase) { const f = document.getElementById("fade"); f.style.transition = "none"; f.classList.add("on"); document.getElementById("title").style.display = "none"; }
    const start = urlCase || await showTitle();
    gameRunning = true; // Esc menu active from here
    await playCase(start, UI);
    // Finale: after Vol VI, read back the ending the player allocated.
    if (start === "vol6_prime") {
      const ENDINGS = {
        remembrance: "ENDING — REMEMBRANCE · Everything returns: the histories, the griefs, the wars, the names. Unstable, uncertain — and real. Humanity begins again.",
        acceptance: "ENDING — ACCEPTANCE · The Archive stays sealed. The world stays peaceful, and never learns the price. One person carries the truth. Quietly. Forever.",
        continuation: "ENDING — CONTINUATION · A new guardian holds the Archive — one who remembers what it cost. Somewhere below, a new Keeper arrives, three minutes late.",
        memoire: "ENDING — MÉMOIRE · The cycle of ignorance is broken. A memory forgotten can be found again. A truth never sought is lost forever.",
      };
      await UI.banner("MÉMOIRE");
      await UI.banner(ENDINGS[State.data.flags.memoire_ending] || "An ending.");
      await UI.banner("Memory is not what happened. Memory is what continues.");
    }
    await UI.banner("— end of this volume —");
    await UI.banner("Returning to the Bureau. Choose your next case from the board.");

    // Persistent hub: a volume is unlocked if it's Vol I or the prior volume is done.
    const items = VOLUMES.map((v, i) => {
      const prior = i === 0 ? null : VOLUMES[i - 1].done;
      const unlocked = i === 0 || !!State.data.flags[prior];
      const played = !!State.data.flags[v.done];
      return {
        id: v.id,
        label: `${v.n} — ${v.t}`,
        sub: played ? "✓ archived · replay" : unlocked ? "active case" : "locked — finish the prior volume",
        locked: !unlocked,
      };
    });
    items.push({ id: "__menu", label: "Main Menu", sub: "Leave the Bureau · progress saved", locked: false });
    // Hub NPCs: a couple of recurring faces hang around between cases.
    const hubNpcs = [
      { id: "clerk", name: "Vasic, Records Clerk", dialogue: "npc_hub_clerk", color: "0xa08a6a" },
    ];
    const talkTo = async (dlg) => { await playDialogue(dlg); };
    const dest = await UI.hub(items, hubNpcs, talkTo);
    if (dest === "__menu") location.href = location.pathname; // clean reload -> main menu
    else location.search = "?case=" + dest;
  })().catch(e => {
    document.getElementById("overlay-log").innerHTML =
      "<p style='color:#c07a7a'>Error: "+e.message+"</p>";
    console.error(e);
  });
</script>
</body>
</html>
